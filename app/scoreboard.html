<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">

    <title>BOA Scoreboard</title>
    <link rel="stylesheet" href="./expressassets/css/bootstrap.min.css">
    <style>
        @font-face {
            font-family: 'Montserrat';
            src: url('fonts/Montserrat-ThinItalic.woff2') format('woff2'),
                url('fonts/Montserrat-ThinItalic.woff') format('woff');
            font-weight: 100;
            font-style: italic;
            font-display: swap;
        }

        @font-face {
            font-family: 'Montserrat';
            src: url('fonts/Montserrat-Thin.woff2') format('woff2'),
                url('fonts/Montserrat-Thin.woff') format('woff');
            font-weight: 100;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Montserrat';
            src: url('fonts/Montserrat-ExtraBold.woff2') format('woff2'),
                url('fonts/Montserrat-ExtraBold.woff') format('woff');
            font-weight: 800;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Montserrat';
            src: url('fonts/Montserrat-Regular.woff2') format('woff2'),
                url('fonts/Montserrat-Regular.woff') format('woff');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }


        body {
            cursor: none;
            font-family: 'Montserrat', sans-serif;
            font-weight: 100;
            background-color: #fff;
            transition: background-color 800ms ease;
        }
        #connectionError {
            position: absolute;
            bottom: 0px;
            right: 0px;
            width: 100px;
            display: none;
        }
        #leaderboard {
            height: 1920px;
            width: 1080px;
            overflow: hidden;
            background-color: #fff;
            background-image: url('./expressassets/images/leaderboard_background.png');
            background-size: 100% auto;
            background-position: top center;
            background-repeat: no-repeat;
            position: absolute;
            top:0px;
            left:0px;
        }
        #leaderboard::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(to bottom, transparent 0%, transparent 33%, #fff 70%);
            pointer-events: none;
        }
        #leaderboardLogo {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 260px;
            z-index: 1;
        }
        #leaderboardHeader {
            position: absolute;
            top: 220px;
            left: 0;
            width: 1080px;
            text-align: center;
            font-family: 'Montserrat';
            font-weight: 800;
            font-size: 58px;
            color: #1d4999;
            text-transform: uppercase;
            letter-spacing: 2px;
            z-index: 1;
        }
        #newScore {
            display: none;
            position: absolute;
            top: 0px;
            left: 0px;
            z-index: 10001;
            background-color: #1B459C;
            color: #fff;
            background-image: url('./expressassets/images/new_score_background_overlay.png'), url('./expressassets/images/new_score_background.png');
            background-size: cover, cover;
            background-position: center, center;
            background-repeat: no-repeat, no-repeat;
            font-weight: 500;
            height:1920px;
            width:1080px;
        }
        #newScoreBanner {
            position: absolute;
            top: 332px;
            left: 50%;
            transform: translateX(-50%);
            width: 620px;
            z-index: 1;
        }
        #newScoreLogo {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 270px;
            z-index: 1;
        }
        #header {
            height: 330px;
            text-align: center;
            position: absolute;
            top: 0px;
            left: 0px;
            width: 1080px;
        }
        #logo {
            margin: auto;
            z-index: 10000;
            position: absolute;
            top: 0px;
            left: 0px;
        }
        #footer {
            margin: auto;
            z-index: 10000;
            position: absolute;
            bottom: 0px;
            left: 0px;
        }
        #tableHeader {
            z-index: 10000;
            position: absolute;
            top: -11px;
            left: 0px;
        }
        .table {
            font-size: 67px;
            border-bottom: #6f6f6f;
            margin-top: 333px;
            width: 80%;
            margin: auto;
        }
        .table td {
            padding-top: 14px;
            padding-bottom: 14px;
            border-bottom: 3px solid #6f6f6f;
            color: #6f6f6f;
        }
        .table th {
            padding-top: 50px;
            padding-bottom: 50px;
            background-color: #afabc9;
            border: 3px solid #7c6992;
            color: #6f6f6f;
        }
        .superscript { position: relative; top: -0.5em; font-size: 80%; }
        .place {
            text-align: left;
            border-left: 0px !important;
            width: 30px;
        }
        .name {
            padding-left: 10px !important;
            width: 440px !important;
            text-align: left;
            overflow: hidden !important;
        }
        .score {
            text-align: right;
            border-right: 0px !important;
            width: 340px;
        }
        .table thead th { border-top: 0px !important; }
        #scoreboard { margin-top: 200px; }

            opacity: 1;
            display: block;
            position: absolute;
            top: 0px;
            left: 0px;
            z-index: 10001;
            background-color: #122048;
            color: #fff;
            background-size: cover;
            font-family: "BMWTypeNext Pro";
            font-weight: 500;
        } */
        #square { position: absolute; bottom: -1140px; }
        #mascott { position: absolute; bottom: -10px; left: -1238px; }
        #newName {
            position: relative;
            top: 259px;
            font-size: 165px;
            opacity: 0;
            color: #fff;
            margin: auto;
            text-align: center;
        }
        #newScoreArea {
            position: absolute;
            top: 588px;
            left: 0;
            font-size: 264px;
            color: #06205c;
            opacity: 0;
            width: 1080px;
            text-align: center;
            line-height: 1;
        }
        #newScoreText {
            display: inline-block;
            color: #fff;
            position: absolute;
            left: 96px;
            top: 1032px;
            font-size: 286px;
            width: 897px;
            text-align: center;
            font-family: 'Montserrat';
            font-weight: 100;
        }
        #pts {
            position: relative;
            top: -44px;
            font-size: 245px;
            display: block;
        }
        .table td, .table th {
            padding: 0.75rem;
            vertical-align: top;
            border-top: 0px solid #06205c;
        }
        #guageTop {
            height: 1128px;
            width: 1080px;
            position: absolute;
            background-image: url(./expressassets/images/top2026.png);
            background-size: contain;
            background-repeat: no-repeat;
            left: 400px;
            top: -21px;
        }
        #guageBottom {
            height: 1128px;
            width: 1080px;
            position: absolute;
            background-image: url(./expressassets/images/bottom2026.png);
            background-size: contain;
            background-repeat: no-repeat;
            background-color: #122048;
            left: 400px;
            top: -21px;
        }
        #color {
            background: #158ce5;
            width: 642px;
            height: 16px;
            position: absolute;
            bottom: 46px;
            left: 404px;
            -webkit-box-shadow: 1px 1px 3px 0 rgba(0, 0, 0, 0.5);
            box-shadow: 1px 1px 3px 0 rgba(0, 0, 0, 0.5);
        }
        #line {
            z-index: 1000;
            position: inherit;
            top: -14px;
            width: 215px;
            left: 460px;
        }
        .speedNumber {
            font-family: "BMWTypeNext";
            font-weight: 300;
            font-size: 55px;
            color: #fff;
        }
        #zero   { position: absolute; top: 965px; left: 620px; }
        #twenty { position: absolute; top: 853px; left: 562px; }
        #fourty { position: absolute; top: 742px; left: 488px; }
        #sixty  { position: absolute; top: 633px; left: 420px; }
        #eighty { position: absolute; top: 519px; left: 355px; }
        #onehundred  { position: absolute; top: 407px; left: 334px; }
        #onetwenty   { position: absolute; top: 296px; left: 429px; }
        #oneforty    { position: absolute; top: 184px; left: 532px; }
        #onesixty    { position: absolute; top: 73px;  left: 634px; }


        .leaderboardValue {
            color: #1b459c;
            border-top: 1px solid #1b459c;
            border-bottom: 1px solid #1b459c;
            padding-top: 48px;
            padding-bottom: 48px;
        }
        .leaderboardTable{
            font-family: 'Montserrat';
            font-weight: 400;
            font-size: 72px;
            border-collapse: collapse;
        }
        #leaderboard1 {
            position: absolute;
            top: 380px;
            left: 70px;
            width: 940px;
            line-height: 1.2;
            z-index: 1;
        }
        .place{
            width: 90px;
            text-align: center;
        }
        .initial{
            width: 600px;
            text-align: center;
        }
        .score{
            width: 250px;
            text-align: center;

        }
        #sbTakeover {
            display: none;
            position: absolute;
            top: 0; left: 0;
            z-index: 10002;
            width: 1080px; height: 1920px;
        }
        #sbTakeover img {
            width: 1080px; height: 1920px;
            object-fit: cover;
        }
        #newScoreName {
            position: absolute;
            top: 792px;
            left: 50%;
            transform: translateX(-50%);
            display: inline-block;
            white-space: nowrap;
            background: #fff;
            color: #1d4999;
            font-size: 136px;
            font-family: 'Montserrat';
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 24px 42px;
            border-radius: 36px;
        }

    </style>
</head>
